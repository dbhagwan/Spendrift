name: Polaris
options:
  bundleIdPrefix: com.polaris
  deploymentTarget:
    iOS: "26.0"
    watchOS: "11.0"
  createIntermediateGroups: true

packages:
  # Plaid Link — official iOS SDK for the bank-linking flow.
  LinkKit:
    url: https://github.com/plaid/plaid-link-ios
    from: 6.0.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    # TODO: Set your development team before building on device.
    DEVELOPMENT_TEAM: ""

targets:
  Polaris:
    type: application
    platform: iOS
    sources:
      - path: Polaris
        excludes:
          - "AppIcon.icon"
          - "AppIcon.icon/**"
      # Icon Composer document (Liquid Glass icon) — must stay a package,
      # not loose files, so it rides along as a folder reference.
      - path: Polaris/AppIcon.icon
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.polaris.app
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        INFOPLIST_KEY_NSCameraUsageDescription: "Polaris uses the camera to scan receipts so they can be matched to your transactions."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Polaris uses Face ID to unlock your financial data when app lock is on."
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        # CloudKit sync delivers change pushes via silent remote notifications.
        INFOPLIST_KEY_UIBackgroundModes: [remote-notification]
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
    entitlements:
      path: Polaris/Polaris.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
        com.apple.security.application-groups:
          - group.com.polaris.shared
        # iCloud sync: SwiftData→CloudKit private database + key-value store
        # for the categorization correction memory.
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.polaris.app
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
        aps-environment: development
    dependencies:
      - target: PolarisWidgets
        embed: true
      - target: PolarisWatch
        embed: true
      - package: LinkKit

  PolarisWidgets:
    type: app-extension
    platform: iOS
    sources:
      - PolarisWidgets
      # Widgets share domain models, the design system, and the snapshot store.
      - path: Polaris/Core/Models
      - path: Polaris/Core/Utilities
      - path: Polaris/Core/Persistence/SharedSnapshotStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.polaris.app.widgets
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        INFOPLIST_KEY_CFBundleDisplayName: Polaris Widgets
        INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    info:
      path: PolarisWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: PolarisWidgets/PolarisWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.polaris.shared

  PolarisWatch:
    type: application
    platform: watchOS
    sources:
      - PolarisWatch
      # The watch renders the same precomputed snapshot models.
      - path: Polaris/Core/Models
      - path: Polaris/Core/Utilities
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.polaris.app.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        TARGETED_DEVICE_FAMILY: 4
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.polaris.app
        INFOPLIST_KEY_CFBundleDisplayName: Polaris

  PolarisUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PolarisUITests
    dependencies:
      - target: Polaris
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.polaris.app.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Polaris:
    build:
      targets:
        Polaris: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PolarisUITests
