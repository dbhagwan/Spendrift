name: Spendrift
options:
  bundleIdPrefix: com.spendrift
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    # TODO: Set your development team before building on device.
    DEVELOPMENT_TEAM: ""

targets:
  Spendrift:
    type: application
    platform: iOS
    sources:
      - Spendrift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spendrift.app
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        INFOPLIST_KEY_NSCameraUsageDescription: "Spendrift uses the camera to scan receipts so they can be matched to your transactions."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
    entitlements:
      path: Spendrift/Spendrift.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
        com.apple.security.application-groups:
          - group.com.spendrift.shared
    dependencies:
      - target: SpendriftWidgets
        embed: true
      # TODO: Add the Plaid Link iOS SDK via SPM once backend is configured:
      # https://github.com/plaid/plaid-link-ios

  SpendriftWidgets:
    type: app-extension
    platform: iOS
    sources:
      - SpendriftWidgets
      # Widgets share domain models, the design system, and the snapshot store.
      - path: Spendrift/Core/Models
      - path: Spendrift/Core/Utilities
      - path: Spendrift/Core/Persistence/SharedSnapshotStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spendrift.app.widgets
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        INFOPLIST_KEY_CFBundleDisplayName: Spendrift Widgets
        INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    info:
      path: SpendriftWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: SpendriftWidgets/SpendriftWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.spendrift.shared

  SpendriftUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SpendriftUITests
    dependencies:
      - target: Spendrift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spendrift.app.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Spendrift:
    build:
      targets:
        Spendrift: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SpendriftUITests
