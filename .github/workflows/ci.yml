name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck

  ios:
    name: iOS build + simulator screenshot
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          devices = [d for runtime, devs in data['devices'].items() if 'iOS' in runtime for d in devs if d['name'].startswith('iPhone')]
          devices.sort(key=lambda d: d['name'], reverse=True)
          print(devices[0]['udid'] if devices else '')")
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available"; xcrun simctl list devices; exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl list devices available | grep iPhone

      - name: Prepare simulator (clean status bar)
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl status_bar "$UDID" override \
            --time "9:41" --batteryLevel 100 --batteryState charged \
            --cellularBars 4 --wifiBars 3 --operatorName "" || true

      - name: Build and run UI screenshot tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Spendrift.xcodeproj \
            -scheme Spendrift \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Export screenshots from test results
        if: always()
        run: |
          mkdir -p screenshots
          if [ -d TestResults.xcresult ]; then
            xcrun xcresulttool export attachments \
              --path TestResults.xcresult \
              --output-path screenshots || true
            # Rename exported files to their attachment names using the manifest.
            python3 - <<'EOF'
          import json, os, shutil
          manifest_path = "screenshots/manifest.json"
          if os.path.exists(manifest_path):
              data = json.load(open(manifest_path))
              def walk(node):
                  if isinstance(node, dict):
                      exported, human = node.get("exportedFileName"), node.get("suggestedHumanReadableName")
                      if exported and human:
                          src = os.path.join("screenshots", exported)
                          if os.path.exists(src):
                              dst = os.path.join("screenshots", human if human.endswith(".png") else human + ".png")
                              shutil.move(src, dst)
                      for value in node.values():
                          walk(value)
                  elif isinstance(node, list):
                      for item in node:
                          walk(item)
              walk(data)
          print(sorted(os.listdir("screenshots")))
          EOF

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots
          path: screenshots/
          if-no-files-found: ignore
