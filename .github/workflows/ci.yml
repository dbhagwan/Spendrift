name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck

  ios:
    name: iOS build + simulator screenshot
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          ls -d /Applications/Xcode*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json, re, sys
          data = json.load(sys.stdin)
          candidates = []
          for runtime, devs in data['devices'].items():
              m = re.search(r'iOS-(\d+)-(\d+)', runtime)
              if not m:
                  continue
              version = (int(m.group(1)), int(m.group(2)))
              for d in devs:
                  if d['name'].startswith('iPhone'):
                      # Prefer newest iOS, then Pro models.
                      candidates.append((version, 'Pro' in d['name'], d['name'], d['udid']))
          candidates.sort(reverse=True)
          print(candidates[0][3] if candidates else '')")
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available"; xcrun simctl list devices; exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl list devices available | grep iPhone

      - name: Prepare simulator (clean status bar)
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl status_bar "$UDID" override \
            --time "9:41" --batteryLevel 100 --batteryState charged \
            --cellularBars 4 --wifiBars 3 --operatorName "" || true

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Polaris.xcodeproj \
            -scheme Polaris \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Run UI screenshot tests (screen-recorded)
        run: |
          set -o pipefail
          # The UI test session doubles as the video walkthrough: record the
          # simulator for the duration, finalize after tests with SIGINT.
          # HEVC is hardware-encoded on the Apple-silicon runners — h264 was
          # software-encoded and starved the UI tests into snapshot timeouts.
          xcrun simctl io "${{ steps.sim.outputs.udid }}" recordVideo \
            --codec hevc --force walkthrough.mp4 &
          echo $! > video.pid
          xcodebuild test-without-building \
            -project Polaris.xcodeproj \
            -scheme Polaris \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            -resultBundlePath TestResults.xcresult \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 600

      - name: Finalize walkthrough video
        if: always()
        run: |
          if [ -f video.pid ]; then
            PID="$(cat video.pid)"
            kill -INT "$PID" 2>/dev/null || true
            # recordVideo needs a moment after SIGINT to write the moov atom.
            for _ in $(seq 1 30); do
              kill -0 "$PID" 2>/dev/null || break
              sleep 1
            done
          fi
          ls -la walkthrough.mp4 || true

      - name: Upload walkthrough video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walkthrough-video
          path: walkthrough.mp4
          if-no-files-found: ignore

      - name: Export screenshots from test results
        if: always()
        run: |
          mkdir -p screenshots
          if [ -d TestResults.xcresult ]; then
            xcrun xcresulttool export attachments \
              --path TestResults.xcresult \
              --output-path screenshots || true
            # Rename exported files to their attachment names using the manifest.
            python3 - <<'EOF'
          import json, os, shutil
          manifest_path = "screenshots/manifest.json"
          if os.path.exists(manifest_path):
              data = json.load(open(manifest_path))
              def walk(node):
                  if isinstance(node, dict):
                      exported, human = node.get("exportedFileName"), node.get("suggestedHumanReadableName")
                      if exported and human:
                          src = os.path.join("screenshots", exported)
                          if os.path.exists(src):
                              dst = os.path.join("screenshots", human if human.endswith(".png") else human + ".png")
                              shutil.move(src, dst)
                      for value in node.values():
                          walk(value)
                  elif isinstance(node, list):
                      for item in node:
                          walk(item)
              walk(data)
          # Keep only PNG screenshots, with artifact-safe filenames (the
          # uploader rejects quotes and other special characters).
          import re
          for name in os.listdir("screenshots"):
              path = os.path.join("screenshots", name)
              if not name.lower().endswith(".png") or os.path.isdir(path):
                  if os.path.isfile(path):
                      os.remove(path)
                  continue
              safe = re.sub(r"[^A-Za-z0-9._-]", "_", name)
              if safe != name:
                  shutil.move(path, os.path.join("screenshots", safe))
          print(sorted(os.listdir("screenshots")))
          EOF
          fi

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots
          path: screenshots/
          if-no-files-found: ignore
